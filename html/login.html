<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login — GameHub</title>
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <header>
        <a class="logo" href="../index.html">🎮 GameHub</a>
        <nav>
            <a href="../index.html">Home</a>
            <a href="library.html">Library</a>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <h1>Welcome Back</h1>
            <p>Log in to your GameHub account</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email or Username</label>
                    <input type="text" id="email" placeholder="Enter your email or username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p class="auth-link">Don't have an account? <a href="register.html">Create one here</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e)=>{
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            const users = JSON.parse(localStorage.getItem('gameHubUsers') || '[]');
            const user = users.find(u => (u.email === email || u.username === email) && u.password === password);
            
            if(user){
                localStorage.setItem('currentUser', JSON.stringify({username: user.username, email: user.email}));
                alert(`Welcome back, ${user.username}!`);
                window.location.href = '../index.html';
            }else{
                alert('Invalid email/username or password');
            }
        });
    </script>
    <script src="../js/global.js"></script>
</body>
</html>
