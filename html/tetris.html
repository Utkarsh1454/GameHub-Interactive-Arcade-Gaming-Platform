<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Tetris — GameHub</title>
    <link rel="stylesheet" href="../css/tetris.css">
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <header>
        <a class="logo" href="../index.html">🎮 GameHub</a>
        <nav>
            <a href="../index.html">Home</a>
            <a href="library.html">Library</a>
        </nav>
    </header>

    <main class="tetris-wrap">
        <h1>Tetris</h1>
        <div class="board-container">
            <canvas id="tetris" width="240" height="400"></canvas>
            <div class="info">
                <div>Score: <span id="score">0</span></div>
                <div>Lines: <span id="lines">0</span></div>
                <button id="startBtn" class="btn">Start</button>
                <button id="resetBtn" class="btn">Reset</button>
            </div>
        </div>
        <p style="margin-top:18px;">Controls: ← → rotate: ↑ or X, soft drop: ↓, hard drop: Space</p>
        
        <div class="mobile-controls centered" style="margin-top: 24px; gap: 30px;">
            <div class="d-pad">
                <div class="btn-touch d-left" id="t-left">◀</div>
                <div class="btn-touch d-right" id="t-right">▶</div>
                <div class="btn-touch d-down" id="t-down">▼</div>
            </div>
            <div class="action-btns">
                <div class="btn-touch" id="t-rot" style="font-size:28px;">↻</div>
                <div class="btn-touch" id="t-drop" style="width: 70px; height: 70px; font-size: 14px; font-weight: bold;">DROP</div>
            </div>
        </div>
    </main>

    <script src="../js/tetris.js"></script>
    <script src="../js/global.js"></script>
</body>
</html>
