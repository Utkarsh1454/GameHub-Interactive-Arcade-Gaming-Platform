<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Tetris — GameHub</title>
    <link rel="stylesheet" href="../css/tetris.css">
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <header>
        <a class="logo" href="../index.html">🎮 GameHub</a>
        <nav>
            <a href="../index.html">Home</a>
            <a href="library.html">Library</a>
        </nav>
    </header>

    <main class="tetris-wrap">
        <h1>Tetris</h1>
        <div class="board-container">
            <canvas id="tetris" width="240" height="400"></canvas>
            <div class="info">
                <div>Score: <span id="score">0</span></div>
                <div>Lines: <span id="lines">0</span></div>
                <button id="startBtn" class="btn">Start</button>
                <button id="resetBtn" class="btn">Reset</button>
            </div>
        </div>
        <p class="desktop-controls" style="margin-top:18px;">Controls: ← → rotate: ↑ or X, soft drop: ↓, hard drop: Space</p>
        
        <div class="true-mobile-controls">
            <div class="dpad-cross">
                <button class="dpad-btn dpad-up" id="t-rot">↻</button>
                <button class="dpad-btn dpad-left" id="t-left">◀</button>
                <button class="dpad-btn dpad-down" id="t-down">▼</button>
                <button class="dpad-btn dpad-right" id="t-right">▶</button>
            </div>
            <div class="action-side">
                <button class="action-drop" id="t-drop">DROP</button>
            </div>
        </div>
    </main>

    <script src="../js/tetris.js"></script>
    <script src="../js/global.js"></script>
</body>
</html>
